[build]
builder = "RAILPACK"
# Deploy on any change in the repo. Without this, Railway may show deploys as
# SKIPPED with "No changes to watched files" when its UI-configured watch
# paths do not match the actual edit. The wildcard overrides those settings.
watchPatterns = ["**/*"]

[deploy]
startCommand = "python main.py"
requiredMountPath = "/data"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
